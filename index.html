  <script>
    // ルーム作成/参加 ダイアログ (合言葉制)
    (function () {
      const dialog = document.getElementById('room-dialog');
      const nameIn = document.getElementById('room-name');
      const codeRow = document.getElementById('room-code-row');
      const codeIn = document.getElementById('room-code');
      const note = document.getElementById('room-dialog-note');
      const isLocal = new URLSearchParams(location.search).get('local') === '1';
      let mode = 'host';
      function open(m) {
        mode = m;
        if (!isLocal && (typeof FIREBASE_CONFIG === 'undefined' || !FIREBASE_CONFIG)) {
          alert('ルーム対戦は 準備中です (サーバ設定待ち)。もう少しお待ちください!');
          return;
        }
        document.getElementById('room-dialog-title').textContent =
          m === 'host' ? '👥 ルーム作成' : '🔗 ルーム参加';
        codeRow.hidden = (m === 'host');
        note.textContent = m === 'host'
          ? '作成すると 4桁の合言葉が発行されます。参加者に伝えてください。'
          : 'ホストから聞いた 4桁の合言葉を入力してください。';
        nameIn.value = localStorage.getItem('omoroi-nickname') || '';
        dialog.hidden = false;
        nameIn.focus();
      }
      function go() {
        const name = nameIn.value.trim();
        if (!name) { nameIn.focus(); return; }
        localStorage.setItem('omoroi-nickname', name);
        const local = isLocal ? '&local=1' : '';
        if (mode === 'host') {
          location.href = `game.html?net=host&name=${encodeURIComponent(name)}${local}`;
        } else {
          const code = codeIn.value.trim();
          if (!/^\d{4}$/.test(code)) { codeIn.focus(); return; }
          location.href = `game.html?net=join&room=${code}&name=${encodeURIComponent(name)}${local}`;
        }
      }
      document.getElementById('btn-room-create')?.addEventListener('click', () => open('host'));
      document.getElementById('btn-room-join')?.addEventListener('click', () => open('join'));
      document.getElementById('room-cancel')?.addEventListener('click', () => { dialog.hidden = true; });
      document.getElementById('room-go')?.addEventListener('click', go);
      dialog?.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') go();
        if (e.key === 'Escape') dialog.hidden = true;
      });
    })();
  </script>
