<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d3b1f">
  <link rel="stylesheet" href="style.css?v=0.9.3">
  <title>対戦中 — おもろい三麻</title>
</head>
<body class="game-body">
  <div class="game">
    <header class="game__header">
      <a href="index.html" class="game__back" aria-label="ロビーへ戻る">←</a>
      <span class="game__round" id="game-round">東1局 0本場</span>
      <span class="game__turn" id="game-turn">あなたの番</span>
      <span class="game__remain" id="game-remain">山残: 54</span>
      <button class="game__guide-btn" id="coach-btn" title="AI採点 ON/OFF">🎓</button>
      <button class="game__guide-btn" id="se-btn" title="効果音 ON/OFF">🔊</button>
      <button class="game__guide-btn" id="guide-btn" title="ガイド再表示">📚</button>
    </header>

    <div class="game__hint" id="game-hint">配牌中...</div>

    <!-- 雀卓 — 4家配置 (left=上家 / top=対面 / right=下家 / bottom=自家) -->
    <div class="table" id="table">
      <!-- 中央: 場情報 (ドラ表示は山に物理的に表示するので 中央には書かない) -->
      <div class="center">
        <div class="center__round-info">
          <span id="center-round">東1</span><br>山残 <span id="center-remain">54</span>
          <span id="center-kyotaku" class="center__kyotaku"></span>
        </div>
        <div class="center__kandora" id="center-kandora" hidden></div>
      </div>

      <!-- 河エリア (中央 box の 4方向に集合) -->
      <div class="river-area river-area--top" id="river-top"></div>
      <div class="river-area river-area--right" id="river-right"></div>
      <div class="river-area river-area--bottom" id="river-bottom"></div>
      <div class="river-area river-area--left" id="river-left"></div>

      <!-- 対面 (画面上) -->
      <div class="seat seat--top" id="seat-top">
        <div class="seat__hand seat__hand--enemy seat__hand--top" id="hand-top"></div>
        <div class="seat__label" id="label-top">対面</div>
        <div class="seat__wall seat__wall--top" id="wall-top"></div>
      </div>

      <!-- 上家 (画面左) -->
      <div class="seat seat--left" id="seat-left">
        <div class="seat__hand seat__hand--enemy seat__hand--left" id="hand-left"></div>
        <div class="seat__label" id="label-left">上家</div>
        <div class="seat__wall seat__wall--left" id="wall-left"></div>
      </div>

      <!-- 下家 (画面右) -->
      <div class="seat seat--right" id="seat-right">
        <div class="seat__hand seat__hand--enemy seat__hand--right" id="hand-right"></div>
        <div class="seat__label" id="label-right">下家</div>
        <div class="seat__wall seat__wall--right" id="wall-right"></div>
      </div>

      <!-- 自家 (画面下、 親) -->
      <div class="seat seat--bottom" id="seat-bottom">
        <div class="seat__wall seat__wall--bottom" id="wall-bottom"></div>
        <div class="seat__label" id="label-bottom">あなた</div>
        <div class="seat__hand seat__hand--mine seat__hand--bottom" id="hand-bottom"></div>
        <!-- リーチ中の待ち牌ガイド (column-reverse なので DOM末尾 = 手牌の上に表示) -->
        <div class="riichi-guide" id="riichi-guide" hidden></div>
      </div>
    </div>

    <footer class="action-bar">
      <button class="action-btn" id="btn-riichi" disabled title="キー: R">リーチ</button>
      <button class="action-btn" id="btn-tsumo" disabled title="キー: T">ツモ</button>
      <button class="action-btn" id="btn-ron" disabled title="キー: L">ロン</button>
      <button class="action-btn" id="btn-pass" disabled title="ロンできる時に あえて上がらず流す (キー: P)">見逃す</button>
      <button class="action-btn" id="btn-pon" disabled title="ポン — 他家の捨て牌+手の2枚で刻子 (キー: O)">ポン</button>
      <button class="action-btn" id="btn-kita" disabled title="キー: K">北抜き</button>
      <button class="action-btn" id="btn-kan" disabled title="カン — 暗槓(手4枚)/明槓(捨て牌+手3枚)、カンドラが増える (キー: G)">カン</button>
      <button class="action-btn action-btn--primary" id="btn-discard" disabled title="キー: Enter (牌選択は ←→)">打牌</button>
    </footer>
  </div>

  <!-- オンボーディング -->
  <div class="guide-overlay" id="guide-overlay" hidden>
    <div class="guide-modal">
      <h2 class="guide-modal__title" id="guide-title">配牌完了!</h2>
      <p class="guide-modal__text" id="guide-text">手牌13枚が配られました。</p>
      <div class="guide-modal__nav">
        <span class="guide-modal__step" id="guide-step">1 / 6</span>
        <button class="guide-modal__skip" id="guide-skip">スキップ</button>
        <button class="guide-modal__next" id="guide-next">次へ →</button>
      </div>
    </div>
  </div>

  <!-- サイコロセレモニー -->
  <div class="dice-overlay" id="dice-overlay" hidden>
    <div class="dice-modal">
      <h2 class="dice-modal__title" id="dice-title">🎲 サイコロを振ります</h2>
      <div class="dice-row">
        <div class="dice" id="dice-1">⚀</div>
        <span class="dice-plus">+</span>
        <div class="dice" id="dice-2">⚀</div>
        <span class="dice-equals">=</span>
        <div class="dice-total" id="dice-total">?</div>
      </div>
      <p class="dice-explain" id="dice-explain">サイコロが転がっています…</p>
      <div class="dice-counter" id="dice-counter" hidden>
        <span class="dice-counter__label">数えています:</span>
        <span class="dice-counter__num" id="dice-counter-num">1</span>
      </div>
      <div class="dice-mnemonic" id="dice-mnemonic" hidden>
        <p class="dice-mnemonic__title">💡 覚え方のコツ</p>
        <p class="dice-mnemonic__line"><b>自</b>5(じご)・<b>自</b>9(じく)</p>
        <p class="dice-mnemonic__line"><b>右</b>2(うに)・<b>右</b>6(うろく)・<b>右</b>10(うじゅう)</p>
        <p class="dice-mnemonic__line"><b>対</b>3(といさん)・<b>対</b>7(といしち)・<b>対</b>11(といじゅういち)</p>
        <p class="dice-mnemonic__line"><b>左</b>4(さし)・<b>左</b>8(さっぱ)・<b>左</b>12(さじゅうに)</p>
      </div>
      <button class="dice-ok" id="dice-ok" hidden>はじめる</button>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <!-- AI採点コーチ (打牌の即時評価、 🎓トグルでON/OFF) -->
  <div class="coach-banner" id="coach-banner" hidden></div>

  <!-- 宣言カットイン演出 (リーチ/ロン/ツモ/北抜き) -->
  <div class="callout" id="callout" hidden>
    <span class="callout__text" id="callout-text">リーチ!</span>
  </div>

  <div class="end-overlay" id="end-overlay" hidden>
    <div class="end-modal">
      <h2 class="end-modal__title" id="end-title">流局</h2>
      <p class="end-modal__text" id="end-text">山が尽きました。</p>
      <div class="end-modal__nav">
        <button class="end-modal__btn" id="end-next">次の局へ</button>
        <button class="end-modal__btn end-modal__btn--secondary" id="end-kifu" hidden>📖 ふりかえる</button>
        <a href="index.html" class="end-modal__btn end-modal__btn--secondary">ロビーへ</a>
      </div>
    </div>
  </div>

  <script src="firebase-config.js?v=0.9.3"></script>
  <script src="net.js?v=0.9.3"></script>
  <script src="script.js?v=0.9.3"></script>
  <script src="netgame.js?v=0.9.3"></script>
</body>
</html>
