<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d3b1f">
  <link rel="stylesheet" href="style.css?v=0.2.0">
  <title>対戦中 — おもろい三麻</title>
</head>
<body class="game-body">
  <div class="game">
    <header class="game__header">
      <a href="index.html" class="game__back" aria-label="ロビーへ戻る">←</a>
      <span class="game__round" id="game-round">東1局 0本場</span>
      <span class="game__turn" id="game-turn">あなたの番</span>
      <span class="game__remain" id="game-remain">山残: 55</span>
      <button class="game__guide-btn" id="guide-btn" title="ガイド再表示">📚</button>
    </header>

    <!-- ヒントバー (今すべきことを動的に表示) -->
    <div class="game__hint" id="game-hint">配牌中...</div>

    <!-- 円卓トップビュー -->
    <div class="table" id="table">
      <!-- 上家 (画面上、 自家から見て左隣) -->
      <div class="seat seat--top" id="seat-top">
        <div class="seat__hand seat__hand--enemy" id="hand-top"></div>
        <div class="seat__label" id="label-top">上家 (CPU花子)</div>
        <div class="seat__wall-wrap">
          <div class="seat__wall seat__wall--top" id="wall-top"></div>
        </div>
        <div class="seat__river" id="river-top"></div>
      </div>

      <!-- 下家 (画面右、 自家から見て右隣) -->
      <div class="seat seat--right" id="seat-right">
        <div class="seat__hand seat__hand--enemy" id="hand-right"></div>
        <div class="seat__label" id="label-right">下家<br>(CPU太郎)</div>
        <div class="seat__wall-wrap">
          <div class="seat__wall seat__wall--right" id="wall-right"></div>
        </div>
        <div class="seat__river" id="river-right"></div>
      </div>

      <!-- 中央: 場の情報 (王牌+ドラ表示+山残数) -->
      <div class="center">
        <div class="center__king" id="king-display">
          <div class="center__king-label">王牌 (ドラ表示)</div>
          <div class="center__king-tiles" id="king-tiles"></div>
        </div>
        <div class="center__round-info">
          <span id="center-round">東1</span> ・ 山残 <span id="center-remain">55</span>
        </div>
      </div>

      <!-- 自家 (画面下、 親) -->
      <div class="seat seat--bottom" id="seat-bottom">
        <div class="seat__river" id="river-bottom"></div>
        <div class="seat__wall-wrap">
          <div class="seat__wall seat__wall--bottom" id="wall-bottom"></div>
        </div>
        <div class="seat__label" id="label-bottom">あなた (親) — 東家</div>
        <div class="seat__hand seat__hand--mine" id="hand-bottom"></div>
      </div>
    </div>

    <!-- アクションバー -->
    <footer class="action-bar">
      <button class="action-btn" id="btn-riichi" disabled title="Phase 3 で実装">リーチ</button>
      <button class="action-btn" id="btn-tsumo" disabled title="ツモ (山から1牌)">ツモ</button>
      <button class="action-btn" id="btn-kita" disabled title="北を抜く (関西1翻)">北抜き</button>
      <button class="action-btn action-btn--primary" id="btn-discard" disabled title="選択中の牌を打牌">打牌</button>
    </footer>
  </div>

  <!-- オンボーディング ガイド (初回のみ) -->
  <div class="guide-overlay" id="guide-overlay" hidden>
    <div class="guide-modal">
      <h2 class="guide-modal__title" id="guide-title">配牌完了!</h2>
      <p class="guide-modal__text" id="guide-text">手牌13枚が配られました。</p>
      <div class="guide-modal__nav">
        <span class="guide-modal__step" id="guide-step">1 / 6</span>
        <button class="guide-modal__skip" id="guide-skip">スキップ</button>
        <button class="guide-modal__next" id="guide-next">次へ →</button>
      </div>
    </div>
  </div>

  <!-- メッセージ トースト -->
  <div class="toast" id="toast" hidden></div>

  <!-- 局終了モーダル (流局 / あがり) -->
  <div class="end-overlay" id="end-overlay" hidden>
    <div class="end-modal">
      <h2 class="end-modal__title" id="end-title">流局</h2>
      <p class="end-modal__text" id="end-text">山が尽きました。</p>
      <div class="end-modal__nav">
        <button class="end-modal__btn" id="end-next">次の局へ</button>
        <a href="index.html" class="end-modal__btn end-modal__btn--secondary">ロビーへ</a>
      </div>
    </div>
  </div>

  <script src="script.js?v=0.2.0"></script>
</body>
</html>
