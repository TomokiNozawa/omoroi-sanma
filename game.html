<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d3b1f">
  <link rel="stylesheet" href="style.css?v=0.1.0">
  <title>対戦中 — おもろい三麻</title>
</head>
<body class="game-body">
  <div class="game">
    <header class="game__header">
      <a href="index.html" class="game__back" aria-label="ロビーへ戻る">←</a>
      <span class="game__round" id="game-round">東1局 0本場</span>
      <span class="game__remain" id="game-remain">山残: 55</span>
      <button class="game__guide-btn" id="guide-btn" title="ガイド再表示">📚</button>
    </header>

    <!-- 円卓トップビュー -->
    <div class="table" id="table">
      <!-- 上家 (CPU2) -->
      <div class="seat seat--top" id="seat-top">
        <div class="seat__label">CPU上家</div>
        <div class="seat__hand" id="hand-top"></div>
        <div class="seat__river" id="river-top"></div>
      </div>

      <!-- 下家 (CPU3) -->
      <div class="seat seat--right" id="seat-right">
        <div class="seat__label">CPU下家</div>
        <div class="seat__hand" id="hand-right"></div>
        <div class="seat__river" id="river-right"></div>
      </div>

      <!-- 中央: 山 + 王牌 + ドラ表示 -->
      <div class="center">
        <div class="center__wall" id="wall-display">
          <span class="center__wall-label">山</span>
          <span class="center__wall-count" id="wall-count">55</span>
        </div>
        <div class="center__king" id="king-display">
          <div class="center__king-label">王牌</div>
          <div class="center__king-tiles" id="king-tiles"></div>
          <div class="center__dora-label">ドラ表示</div>
        </div>
        <div class="center__round-info">
          <span id="center-round">東1</span>
        </div>
      </div>

      <!-- 自家 (画面下) -->
      <div class="seat seat--bottom" id="seat-bottom">
        <div class="seat__river" id="river-bottom"></div>
        <div class="seat__hand seat__hand--mine" id="hand-bottom"></div>
        <div class="seat__label">あなた</div>
      </div>
    </div>

    <!-- アクションバー -->
    <footer class="action-bar">
      <button class="action-btn" id="btn-riichi" disabled>リーチ</button>
      <button class="action-btn" id="btn-tsumo" disabled>ツモ</button>
      <button class="action-btn" id="btn-ron" disabled>ロン</button>
      <button class="action-btn" id="btn-kita" disabled>北抜き</button>
      <button class="action-btn action-btn--primary" id="btn-discard" disabled>打牌</button>
    </footer>
  </div>

  <!-- オンボーディング ガイド (初回のみ) -->
  <div class="guide-overlay" id="guide-overlay" hidden>
    <div class="guide-modal">
      <h2 class="guide-modal__title" id="guide-title">配牌完了!</h2>
      <p class="guide-modal__text" id="guide-text">手牌13枚が配られました。 まずは画面の各エリアを見ていきましょう。</p>
      <div class="guide-modal__nav">
        <span class="guide-modal__step" id="guide-step">1 / 6</span>
        <button class="guide-modal__skip" id="guide-skip">スキップ</button>
        <button class="guide-modal__next" id="guide-next">次へ →</button>
      </div>
    </div>
  </div>

  <script src="script.js?v=0.1.0"></script>
</body>
</html>
